<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>스프링 게시판 - 새 글 쓰기</title>

  <link rel="stylesheet" th:href="@{/board/css/common.css}">
  <link rel="stylesheet" th:href="@{/board/css/write.css}">
</head>
<body>
<div class="container">
  <h1 th:text="${postForm.id == null ? '게시글 등록' : '게시글 수정'}">
    게시글 등록
  </h1>

  <div class="nav">
    <a th:href="@{list.html}">목록으로</a>
    <a th:href="@{write.html}">새 글 쓰기</a>
  </div>

  <form
          th:action="${postForm.id == null}
          ? @{write.html}
          : @{edit}"
          th:object="${postForm}"
          method="post">

    <input type="hidden" th:field="*{id}">

    <div class="form-group">
      <label for="title">제목</label>
      <input
              type="text"
              th:field="*{title}"
              placeholder="제목을 입력하세요"
              required>
    </div>

    <div class="form-group">
      <label for="author">작성자</label>
      <input
              type="text"
              th:field="*{author}"
              placeholder="작성자 이름을 입력하세요"
              required>
    </div>

    <div class="form-group">
      <label for="content">내용</label>
      <textarea
              rows="10"
              th:field="*{content}"
              placeholder="내용을 입력하세요"
              required></textarea>
    </div>

    <div style="margin-top: 20px;">
      <button
              type="submit"
              class="btn"
              th:text="${postForm.id == null ? '등록' : '수정'}">
        등록
      </button>

      <a th:href="@{detail.html(id=${postForm.id})}" class="btn btn-secondary">
        취소
      </a>
    </div>
  </form>
</div>
</body>
</html>
