<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스프링 게시판 - 목록</title>
  <link rel="stylesheet" href="/board/css/common.css">
  <link rel="stylesheet" href="/board/css/list.css">
</head>
<body>
  <div class="container">
    <h1>게시글 목록</h1>
    <div class="nav">
      <a href="list.html">목록으로</a>
      <a href="write.html">새 글 쓰기</a>
    </div>

    <table>
      <thead>
        <tr>
          <th>번호</th>
          <th>제목</th>
          <th>작성자</th>
          <th>작성일시</th>
          <th>작업</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="post : ${posts}">
          <td th:text="${post.id}"></td>
          <td>
            <a th:href="@{detail.html(id=${post.id})}" th:text="${post.title}"></a>
          </td>
          <td th:text="${post.author}"></td>
          <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
          <td>
            <a href="list.html" class="btn btn-danger">삭제</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
